# Shift al vim keys to switch windows
set-option -sa terminal-overrides ",xterm*:Tc"
bind -n M-H previous-window
bind -n M-L next-window

set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

#Change prefix to control+space
unbind C-b
set -g prefix C-s
bind C-s send-prefix


#For yazi image preview
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Theme and colors (must be set BEFORE loading catppuccin)
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "default"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_current_style "bold"

set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set-environment -g COLORTERM "truecolor"

# Plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "christoomey/vim-tmux-navigator"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin 'catppuccin/tmux'

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind & split-window -h -c "#{pane_current_path}"

# set -g status-right '#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD)'

set -g status on
set-option -g status-position top
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."


run '~/.config/tmux/plugins/tpm/tpm'

set -g status-style "bg=default"
set -g status-left-style "bg=default"
set -g status-right-style "bg=default"
set -gw window-status-style "bg=default"
set -gw window-status-current-style "bg=default"

set -Fg 'status-format[1]' '#{status-format[0]}'
set -g 'status-format[1]' ''
set -g status 2
